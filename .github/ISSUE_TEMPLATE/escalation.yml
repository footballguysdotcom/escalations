name: Escalation Request
description: Submit an escalation for customer service or staff issues
body:
  - type: dropdown
    id: criticality
    attributes:
      label: Criticality
      description: Choose "THIS IS A CRITICAL ISSUE" only for service outages or critical problems requiring immediate attention.
      options:
        - "This is not a critical issue"
        - "THIS IS A CRITICAL ISSUE"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Thank you for submitting an escalation. Please provide as much detail as possible to help us address the issue quickly.

  - type: dropdown
    id: affected-tool
    attributes:
      label: Affected Tool
      description: Which product or tool is this issue related to?
      options:
        - Footballguys.com
        - Infrastructure
        - League Sync
        - Draft Dominator
        - League Dominator
        - DFS Multi-Lineup Optimizer
        - DFS Single Lineup Builder
        - Other
    validations:
      required: true
  
  - type: input
    id: customer-info
    attributes:
      label: Customer Username or Email
      description: Provide the customer's username or email address
      placeholder: "e.g., john@example.com or username123"
  
  - type: input
    id: zendesk-link
    attributes:
      label: Zendesk Ticket Link
      description: Link to the related Zendesk ticket (if applicable)
      placeholder: "https://sportsguys.zendesk.com/agent/tickets/12345"
  
  - type: input
    id: basecamp-link
    attributes:
      label: Basecamp Thread Link
      description: Link to the related Basecamp discussion (if applicable)
      placeholder: "https://3.basecamp.com/..."
  
  - type: textarea
    id: reproduction-steps
    attributes:
      label: How to see this issue (numbered steps)
      description: Number every step (1., 2., 3., and so on). One action per step. Start from the beginning—for example opening the site or app, or signing in—so someone else can follow the same path.
      placeholder: |
        1. Opened Footballguys.com and signed in
        2. Clicked "My Subscriptions"
        3. Page showed "404 Not Found"; refresh did not help
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What should have happened?
      description: In plain language, what did the user expect to see or be able to do?
      placeholder: "e.g., The subscriptions page should list their current plan and renewal date."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: What happened instead?
      description: What actually appeared or occurred. Include exact error message text if there is one.
      placeholder: "e.g., A 404 error page with no subscription details. Message: \"Page not found.\""
    validations:
      required: true
  
  - type: textarea
    id: customer-impact
    attributes:
      label: Customer Impact
      description: How is this issue affecting the customer or business?
      placeholder: Describe the impact on the customer, revenue, or operations
