# Set "Time to resolve" and "Resolved date" when an escalation issue is closed.
# Requires: In the Escalations project (footballguysdotcom, project 5):
#   - Number field named exactly "Time to resolve (days)" (without quotes).
#   - Optional Date field "Resolved date" – add it to sort the Closed list by resolution date.

name: Set time to resolve on close

on:
  issues:
    types: [closed]

jobs:
  set-time-to-resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Set Time to resolve (days) on project item
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const created = new Date(issue.created_at);
            const closed = new Date(issue.closed_at);
            const days = Math.round((closed - created) / (1000 * 60 * 60 * 24) * 10) / 10;

            const projectQuery = `
              query {
                organization(login: "footballguysdotcom") {
                  projectV2(number: 5) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                          dataType
                        }
                      }
                    }
                  }
                }
              }
            `;
            const projectData = await github.graphql(projectQuery);
            const project = projectData.organization.projectV2;
            const timeToResolveField = project.fields.nodes.find(
              f => f.name === 'Time to resolve (days)' && (f.dataType === 'NUMBER' || !f.dataType)
            );
            const resolvedDateField = project.fields.nodes.find(
              f => f.name === 'Resolved date' && f.dataType === 'DATE'
            );
            if (!timeToResolveField && !resolvedDateField) {
              console.log('Project has neither "Time to resolve (days)" nor "Resolved date" – skip. Add at least one in project settings to enable.');
              return;
            }

            const itemQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          ... on ProjectV2 {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const itemData = await github.graphql(itemQuery, { issueId: issue.node_id });
            const projectItems = itemData?.node?.projectItems?.nodes ?? [];
            const projectItem = projectItems.find(n => n.project?.id === project.id);
            if (!projectItem) {
              console.log('Issue is not on the Escalations project – skip.');
              return;
            }

            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: $value
                }) {
                  projectV2Item { id }
                }
              }
            `;
            if (timeToResolveField) {
              await github.graphql(updateMutation, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: timeToResolveField.id,
                value: { number: days }
              });
              console.log('Set Time to resolve (days) to', days);
            }
            if (resolvedDateField) {
              const resolvedDate = closed.toISOString().slice(0, 10); // YYYY-MM-DD
              await github.graphql(updateMutation, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: resolvedDateField.id,
                value: { date: resolvedDate }
              });
              console.log('Set Resolved date to', resolvedDate);
            }
